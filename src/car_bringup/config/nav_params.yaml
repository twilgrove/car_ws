    #   penalty_epsilon: 0.1
    #   obstacle_cost_exponent: 4.0

    #   # --- 运动学限制权重 ---
    #   weight_max_vel_x: 2.0
    #   weight_max_vel_theta: 1.0
    #   weight_max_vel_y: 2.0       # 必须添加 Y 轴权重

    #   weight_acc_lim_x: 1.0
    #   weight_acc_lim_theta: 1.0
    #   weight_acc_lim_y: 1.0       # 必须添加 Y 轴权重

    #   # --- 全向移动特性 ---
    #   # 1.0 = 允许自由横移 (全向车)。
    #   # 1000.0 = 禁止横移 (差速车)。
    #   weight_kinematics_nh: 1.0   
      
    #   weight_kinematics_forward_drive: 1.0
    #   weight_kinematics_turning_radius: 1.0
      
    #   # --- 时间最优权重 ---
    #   # 低速模式：1.0。安全第一，不追求最快到达。
    #   # 高速模式改：3.0 或 5.0。越大约激进，倾向于切内弯、走直线。
    #   weight_optimaltime: 1.0     

    #   # --- 路径贴合权重 ---
    #   # 低速模式：50.0。严格贴合全局路径，不乱跑。
    #   # 高速模式改：1.0。允许稍微偏离路径以获得更平滑的曲线。
    #   weight_viapoint: 50.0       

    #   weight_shortest_path: 0.0
    #   weight_obstacle: 100.0      # 避障权重极高，低速下绝不能剐蹭
    #   weight_inflation: 0.2
    #   weight_dynamic_obstacle: 10.0 
    #   weight_dynamic_obstacle_inflation: 0.2
    #   weight_adapt_factor: 2.0

    #   # ================== 6. 同伦类规划 (Homotopy Class) ==================
    #   # 【系统保命开关】
    #   # 无论高速低速，鉴于您的内存和CPU情况，必须关闭。
    #   # 只有当您换了高性能工控机后，才考虑开启。
    #   enable_homotopy_class_planning: False 
      
    #   enable_multithreading: True
    #   max_number_classes: 2
    #   selection_cost_hysteresis: 1.0
    #   selection_prefer_initial_plan: 0.95
    #   selection_obst_cost_scale: 1.0
    #   selection_alternative_time_cost: False
    #   roadmap_graph_no_samples: 15
    #   roadmap_graph_area_width: 5.0
    #   h_signature_prescaler: 0.5
    #   h_signature_threshold: 0.1
    #   obstacle_heading_threshold: 0.45
    #   visualize_hc_graph: False
    #   visualize_with_time_as_z_axis_scale: 0.0

    #   # ================== 7. 恢复与震荡 (Recovery) ==================
      
    #   shrink_horizon_backup: True
    #   shrink_horizon_min_duration: 10.0
    #   oscillation_recovery: True
    #   oscillation_v_eps: 0.1
    #   oscillation_omega_eps: 0.1
    #   oscillation_recovery_min_duration: 10.0
    #   oscillation_filter_duration: 10.0

    #--------------------------------------------DWB 控制器参数---------------------------------------------#
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: False # 调试完记得关掉，省资源
      
      # ================== 1. 速度限制 (Velocity) ==================
      
      # --- X轴 (前后) ---
      # 最小速度设为负数，允许倒车调整。
      # 高速模式改：-3.0 (允许全速倒车)
      min_vel_x: -0.5     
      # 低速模式：0.5。保证精密操作时的安全。
      # 高速模式改：3.0 (硬件极限)
      max_vel_x: 0.5      

      # --- Y轴 (左右 - 全向车核心) ---
      # 【必须开启】DWB默认Y轴是0。全向车必须设为负数才能向右横移！
      # 高速模式改：-3.0
      min_vel_y: -0.3     
      # 高速模式改：3.0
      max_vel_y: 0.3      

      # --- Theta轴 (旋转) ---
      # 高速模式改：1.0
      max_vel_theta: 0.5  

      # --- 绝对速度限制 ---
      min_speed_xy: 0.0
      # 也就是矢量合成后的最大速度
      # 高速模式改：3.0
      max_speed_xy: 0.5   
      min_speed_theta: 0.0

      # ================== 2. 加减速限制 (Dynamics) ==================
      # 【策略】因为您底层有“梯形缓冲”，软件层我们设得稍大一点，
      # 让 DWB 能够快速响应，具体的平滑工作交给底层硬件。
      
      # --- 加速度 ---
      # 低速模式：1.0。起步柔和，防窜。
      # 高速模式改：4.0。响应灵敏。
      acc_lim_x: 1.0      
      acc_lim_y: 1.0      # 【必须添加】全向车需要Y轴加速度
      acc_lim_theta: 1.0  # 高速模式改：3.0

      # --- 减速度 (通常为负数) ---
      # 低速模式：-1.0。
      # 高速模式改：-4.0。急停需要大减速度。
      decel_lim_x: -1.0   
      decel_lim_y: -1.0   # 【必须添加】
      decel_lim_theta: -1.0 # 高速模式改：-3.0

      # ================== 3. 轨迹模拟 (Simulation) ==================
      # DWB 的原理是：“假设我按这个速度跑 x 秒，会撞墙吗？”
      
      # --- 模拟时间 ---
      # 低速模式：1.0秒。只看眼前的障碍，省 CPU。
      # 高速模式改：1.7 或 2.0秒。3m/s 刹车距离长，必须看得远。
      sim_time: 1.0       
      
      # --- 采样密度 (CPU 杀手) ---
      # DWB 会生成 (vx * vy * vtheta) 这么多条轨迹。
      # 差速车 vy=1，全向车 vy 必须大于1，这会导致计算量爆炸！
      # 所以全向车必须适当降低采样数。
      
      vx_samples: 15      # X轴切成15份
      vy_samples: 15      # 【全向车关键】必须 > 1，否则不会横移。建议 10-15。
      vtheta_samples: 20  # 角度切20份
      # 当前总轨迹数 = 15*15*20 = 4500条。如果CPU还卡，把这三个数改小到 10。

      # --- 碰撞检测粒度 ---
      # 沿轨迹每隔多少米检查一次碰撞。
      # 高速模式改：0.1。为了省 CPU，高速时可以稍微稀疏一点。
      linear_granularity: 0.05   
      angular_granularity: 0.025
      
      transform_tolerance: 0.5   # 抗 TF 延迟

      # ================== 4. 目标判定 (Goal Checker) ==================
      xy_goal_tolerance: 0.15    # 距离容差(米)
      
      trans_stopped_velocity: 0.1 # 小于此速度认为停下了
      short_circuit_trajectory_evaluation: True # 优化开关：发现死胡同直接跳过计算
      stateful: True

      # ================== 5. 评分标准 (Critics) ==================
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      
      # 避障权重：如果有障碍物，分数归零。
      BaseObstacle.scale: 0.02        

      # 路径贴合权重 (PathDist)
      # 作用：让机器人贴着全局路径(绿线)走。
      # 低速模式：50.0。强制贴合，走得规矩。
      # 高速模式改：32.0。允许稍微切弯。
      PathDist.scale: 50.0            

      # 目标距离权重 (GoalDist)
      # 作用：鼓励机器人往前走，靠近终点。
      # 低速模式：20.0。
      # 高速模式改：24.0。增强向前冲的欲望。
      GoalDist.scale: 20.0            

      # 路径/目标朝向权重 (Align)
      # 作用：让车头对准路径或目标。
      PathAlign.scale: 32.0           
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0           
      GoalAlign.forward_point_distance: 0.1
      
      # 原地旋转权重 (RotateToGoal)
      # 当距离目标很近，但角度不对时，DWB 会切换到“原地旋转模式”。
      RotateToGoal.scale: 32.0        
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0
    #-------------------------------------------------MPPI 控制器参数-------------------------------------------------#
    # FollowPath:
    #   plugin: "nav2_mppi_controller::MPPIController"
    #   time_steps: 20        # 原来是 56。预测步数改少点，看近点。
    #   model_dt: 0.1         # 预测时间间隔。20 * 0.1 = 预测未来 2.0 秒。
    #   batch_size: 600       # 【关键】采样数量。默认是 2000。
    #                         # 把它降到 600-800，能大幅降低 CPU 负载。
    #   vx_std: 0.2
    #   vy_std: 0.2
    #   wz_std: 0.4
    #   vx_max: 1.0
    #   vx_min: -1.0
    #   vy_max: 1.0
    #   wz_max: 0.6
    #   iteration_count: 1    # 迭代次数。默认是 1。千万别改大。
    #   prune_distance: 1.5
    #   transform_tolerance: 1.0 # 宽容度给大点


#-----------------------------局部代价地图参数-----------------------------#
local_costmap:
  local_costmap:
    ros__parameters:
      # ================== 基础刷新设置 ==================
      update_frequency: 10.0       # 地图更新频率(Hz)
      transform_tolerance: 1.0
      publish_frequency: 5.0      # 发布给 Rviz 显示的频率。不影响算法，只影响你看界面的流畅度。
      always_send_full_costmap: False # 是否每次都发送完整地图。True调试方便但费带宽；False只发变化部分。
      # ================== 坐标系与模式 (核心区别) ==================
      global_frame: odom          # 【关键】局部地图的参考系通常是 odom (里程计坐标系)。
      robot_base_frame: base_link # 机器人中心。
      use_sim_time: False
      rolling_window: true        # 【关键】滚动窗口模式。

      # ================== 地图尺寸 ==================
      width: 6                    # 地图宽度(米)。
      height: 6                   # 地图高度(米)。
      resolution: 0.05            # 分辨率 5cm。
      
      # robot_radius: 0.22          # 碰撞半径
      footprint: "[ [0.234, 0.187], [-0.234, 0.187], [-0.234, -0.187], [0.234, -0.187] ]"

      plugins: ["obstacle_layer", "inflation_layer"]

      # ================== 第一层：静态地图层 ==================
      # 负责加载 SLAM 建好的那张黑白底图
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True # 订阅地图话题的 QoS 设置，确保能收到“迟到”的地图。

      # ================== 第二层：障碍物层 ==================
      # 负责实时处理雷达/深度相机数据，标记临时障碍物（如行人、移动的桌椅）
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True             # 是否启用
        observation_sources: scan # 数据源的名字，对应下面的配置块
        scan:
          topic: /scan            # 订阅的雷达话题
          max_obstacle_height: 2.0 # 高于0.5米的障碍物忽略
          clearing: True          # 是否具备“清除”功能（如果雷达扫过这里发现没东西，就清除掉以前的障碍）
          marking: True           # 是否具备“标记”功能（发现障碍物就标在地图上）
          data_type: "LaserScan"  # 数据类型
          raytrace_max_range: 6.0 # 光线追踪清除范围
          raytrace_min_range: 0.0
          obstacle_max_range: 6.0 # 障碍物检测距离
          obstacle_min_range: 0.0

      # ================== 第三层：膨胀层 ==================
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0  # 成本衰减因子。
                                  # 值越大，成本衰减越快（危险圈越陡峭），机器人越敢靠近障碍物。
                                  # 值越小，危险圈越平缓，机器人会离障碍物远远的。
        inflation_radius: 0.5     # 膨胀半径(米)

#-----------------------------速度平滑器参数-----------------------------#
nav2_velocity_smoother_node:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0   # 平滑频率(Hz)

    # ================= 核心策略 =================
    # 是否按比例缩放速度以保持轨迹形状。
    # True: 如果角速度受限被削减了，线速度也会按比例削减，以保证机器人走的圆弧半径不变。
    # False: 各个轴独立限制。可能导致机器人转弯半径变大（“推头”）。
    scale_velocities: False

    # 反馈模式：
    # "OPEN_LOOP" (开环): 假设机器人完美执行了上一条指令。基于“上一条发出的指令”来计算下一条。
    # "CLOSED_LOOP" (闭环): 监听 /odom。基于“机器人当前的实际速度”来计算下一条。
    feedback: "OPEN_LOOP"

    # ================= 速度限制 [X, Y, Theta] =================
    max_velocity: [3.0, 3.0, 1.0]
    min_velocity: [-3.0, -3.0, -1.0]

    # ================= 加减速限制 [X, Y, Theta] =================
    max_accel: [3.0, 3.0, 1.0]
    max_decel: [-3.0, -3.0, -1.0]

    # ================= 辅助参数 =================
    odom_topic: "odom"              # 仅在 CLOSED_LOOP 模式下需要
    odom_duration: 0.1              # 获取里程计数据的缓冲时间
    
    # 死区设置：如果速度指令小于这个值，直接设为 0。防止手柄漂移或噪音导致机器人缓慢蠕动。
    deadband_velocity: [0.0, 0.0, 0.0] 
    
    # 超时安全：如果 1.0秒 没收到上层指令，就让机器人停下。
    velocity_timeout: 1.0
#-----------------------------恢复行为服务器参数-----------------------------#
nav2_behavior_server_node:
  ros__parameters:
    # ================== 基础连接 ==================
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 20.0       # 动作执行频率(Hz)

    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]

    # ================== 技能 1: 原地旋转 (Spin) ==================
    # 作用：原地转圈。通常用于清空周围地图（用雷达扫一圈），或者在狭窄处掉头。
    spin:
      plugin: "nav2_behaviors/Spin"
    
    # ================== 技能 2: 后退 (BackUp) ==================
    # 作用：直线倒车。通常用于从死胡同或卡住的状态中退出来。
    backup:
      plugin: "nav2_behaviors/BackUp"
    
    # ================== 技能 3: 定向行驶 (DriveOnHeading) ==================
    # 作用：不管当前规划路径，硬着头皮朝车头方向（或指定方向）走一段距离。
    # 场景：比如进电梯、对接充电桩。
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    
    # ================== 技能 4: 原地等待 (Wait) ==================
    # 作用：停止移动，原地待命（发呆）。
    # 场景：前面有人挡路，规划器算不出路了，先等5秒看看人会不会走。
    wait:
      plugin: "nav2_behaviors/Wait"
    
    # ================== 技能 5: 辅助遥控 (AssistedTeleop) ==================
    # 作用：当你用手柄/键盘遥控时，如果快撞墙了，这个插件会介入帮你刹车。
    # 类似于汽车的“主动刹车/防碰撞系统”。
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"

    # ================== 全局参数 ==================
    global_frame: odom          # 参考坐标系。通常用 odom，因为恢复行为是局部的。
    robot_base_frame: base_link
    transform_tolerance: 0.1    # TF 时间容差
    use_sim_time: false
    simulate_ahead_time: 2.0   # 碰撞检测前瞻时间 (秒)

    # ================== 旋转限制参数 ==================
    # 这里的限制专门用于 "Spin" 行为。
    max_rotational_vel: 0.3     # 最大旋转速度
    min_rotational_vel: 0.01     # 最小旋转速度
    rotational_acc_lim: 0.2     # 旋转加速度

