#-----------------------------底盘控制节点参数-----------------------------#
chassis_node:
  ros__parameters:
    port: "/dev/ttyUSB0"
    baudrate: 115200
#-----------------------------Livox 雷达驱动节点参数-----------------------------#
livox_lidar_publisher: 
  ros__parameters:
    use_sim_time: false
    xfer_format : 4
    multi_topic : 0
    data_src : 0
    publish_freq : 10.0
    output_type : 0
    frame_id : "lidar_link"
    lvx_file_path : "/home/livox/livox_test.lvx"
    cmdline_bd_code : "livox0000000001"

#-----------------------------Fast-LIO 建图节点参数-----------------------------#
fast_lio_node:
    ros__parameters:
        use_sim_time: false
        feature_extract_enable: false
        point_filter_num: 3
        max_iteration: 3
        filter_size_surf: 0.5
        filter_size_map: 0.5
        cube_side_length: 1000.0
        runtime_pos_log_enable: false
        map_file_path: "./test.pcd"

        common:
            lid_topic:  "/livox/lidar"
            imu_topic:  "/livox/imu"
            time_sync_en: false         # ONLY turn on when external time synchronization is really not possible
            time_offset_lidar_to_imu: 0.0 # Time offset between lidar and IMU calibrated by other algorithms, e.g. LI-Init (can be found in README).
                                        # This param will take effect no matter what time_sync_en is. So if the time offset is not known exactly, please set as 0.0

        preprocess:
            lidar_type: 1                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR, 4 for any other pointcloud input
            scan_line:  4
            blind: 0.5
            timestamp_unit: 3
            scan_rate: 10

        mapping:
            acc_cov: 0.1
            gyr_cov: 0.1
            b_acc_cov: 0.0001
            b_gyr_cov: 0.0001
            fov_degree:    360.0
            det_range:     100.0
            extrinsic_est_en:  true      # true: enable the online estimation of IMU-LiDAR extrinsic
            extrinsic_T: [ -0.011, -0.02329, 0.04412 ]
            extrinsic_R: [ 1., 0., 0.,
                            0., 1., 0.,
                            0., 0., 1.]

        publish:
            path_en: true                # 里程计路径
            effect_map_en: false         # 特征点地图
            map_en: false                # 全局完整建图
            scan_publish_en:  false      # 当前扫描的点云输出 (当前帧世界坐标系)
            dense_publish_en: false      # 全局点云发布的密度 (设为 true 则发布稠密点云，false 则降采样以节省性能)
            scan_bodyframe_pub_en: false  # 发布相对于车身坐标系且去畸变后的实时点云 

        pcd_save:
            pcd_save_en: false
            interval: -1                 # how many LiDAR frames saved in each pcd file;  -1 : all frames will be saved in ONE pcd file, may lead to memory crash when having too much frames.

#-----------------------------地面分割节点参数-----------------------------#
ground_segmentation_node:
  ros__parameters:
    use_sim_time: false
    n_threads: 3                # 使用的线程数量 (建议设置为 CPU 核心数，提高处理速度)
    r_min: 0.4                  # 最小距离阈值 (盲区过滤，小于 0.4m 的点会被忽略，防止把车体当成障碍物)
    r_max: 50.0                 # 最大距离阈值 (超过 50m 的点不再处理，节省性能)
    n_bins: 140                 # 径向分箱数量 (沿半径方向把扫描范围切成多少圈)
    n_segments: 360             # 角度分段数量 (沿圆周方向切成多少份，360 表示每度一份)

    max_dist_to_line: 0.15      # 判为地面的最大垂直距离 (如果一个点距离拟合出的地面线超过 0.15m，就被认为是障碍物)

    sensor_height: 0.73         # ★关键参数★ 传感器离地高度 (雷达中心到地面的物理高度，单位：米。这个必须量准！)
    min_slope: 0.0              # 地面直线的最小坡度 (通常为0，表示平地)
    max_slope: 0.35             # 地面直线的最大坡度 (超过这个坡度会被认为是墙或者障碍物，0.35弧度约等于20度)
    max_fit_error: 0.075        # 直线拟合过程中的最大允许误差 (越小越严格)
    long_threshold: 1.0         # 长距离断开阈值 (如果同一直线上的两点间距超过1米，视为断开/不同物体)
    max_long_height: 0.1        # 长距离线段中允许的最大高度跳变
    max_start_height: 0.2       # 新线段开始时，允许与预估地面高度的最大差值
    line_search_angle: 0.2      # 寻找直线时的角度搜索范围 [单位：弧度]

    gravity_aligned_frame: ""   # 重力对齐坐标系 (其Z轴与重力方向一致的坐标系)。
                                # 如果留空 ("")，则默认使用传感器坐标系。如果你的雷达是倾斜安装的，这里最好填 "base_link" 或 "map"。

    latch: false                # 是否锁定输出话题 (Latch机制，设为true时，新订阅者会立即收到最后一条消息)
    visualize: false            # 是否发布可视化标记 (仅用于调试 Debug，开启会显著消耗资源，平时设为 false)

    input_topic: "livox/lidar/pointcloud"    # 输入点云话题 ( PointCloud2 话题名)
    obstacle_output_topic: "segmentation/obstacle" # 输出：分割后的障碍物点云
    ground_output_topic: "segmentation/ground"     # 输出：分割后的地面点云

#-----------------------------点云转激光雷达节点参数-----------------------------#
pointcloud_to_laserscan_node:
  ros__parameters:
    use_sim_time: false
    target_frame: "lidar_link"      # 目标坐标系 (将点云转换到该坐标系下进行处理，通常为车身坐标系)
    transform_tolerance: 0.1        # 坐标变换容忍时间 (秒)
    min_height: -0.5                # 点云最低高度阈值 (低于此高度的点会被忽略，单位：米)
    max_height: 0.2                 # 点云最高高度阈值 (高于此高度的点会被忽略，单位：米)
    angle_min: -3.14                # 激光雷达扫描的最小角度 (弧度，-3.14表示-180度)
    angle_max: 3.14                 # 激光雷达扫描的最大角度 (弧度，3.14表示180度)
    angle_increment: 0.0043         # 激光雷达每个测量点之间的角度增量 (弧度，约等于0.33度)
    scan_time: 0.1                  # 扫描周期 (秒)
    range_min: 0.3                  # 激光雷达的最小测距范围 (米)
    range_max: 6.0                 # 激光雷达的最大测距范围 (米)
    use_inf: true                   # 是否使用无穷大表示不可达距离 (true表示使用inf，false表示使用range_max)
    inf_epsilon: 1.0                # 当use_inf为false时，设置不可达距离为range_max加上一个小偏移量 (米)

#-----------------------------ICP 重定位节点参数-----------------------------#
icp_node:
  ros__parameters:
    use_sim_time: false
    pcd_path: "/home/cys/maps/map.pcd"

    # 话题设置 (Mid-360 标准点云)
    pointcloud_topic: "/livox/lidar/pointcloud"

    # 坐标系设置
    map_frame_id: "map"
    odom_frame_id: "odom"   # 对应 Fast-LIO 的里程计
    laser_frame_id: "lidar_link"  # 对应 Mid-360 在 TF 树中的位置

    # ICP 参数
    rough_leaf_size: 0.4    # 粗匹配降采样 (m)
    refine_leaf_size: 0.1   # 精匹配降采样 (m)
    thresh: 0.2             # 匹配得分阈值 (越小越严格)
    tf_rate: 5             # TF 发布频率 (Hz)

    # 搜索范围 (点击 2D Pose Estimate 后，会在这个范围内自动微调)
    xy_offset: 0.2          # XY方向搜索范围 (m)
    yaw_offset: 20.0        # 角度搜索范围 (度)
    yaw_resolution: 15.0     # 角度搜索步长 (度)

    init_pose:
      x: 4.0
      y: 2.0
      z: 0.0
      qx: 0.0
      qy: 0.0
      qz: -0.3
      qw: 0.9


#-----------------------------Nav2 各模块配置（2025）-----------------------------#
#-----------------------------地图服务器节点参数-----------------------------#
nav2_map_server_node:
  ros__parameters:
    use_sim_time: False
    yaml_filename: "/home/cys/maps/map.yaml"
    frame_id: "map"

#-----------------------------路径跟随器参数-----------------------------#
waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

#-----------------------------行为树导航器参数-----------------------------#
nav2_bt_navigator_node:
  ros__parameters:
    # ================== 基础设置 ==================
    use_sim_time: False
    global_frame: map           # 导航使用的全局坐标系
    robot_base_frame: base_link # 机器人自身的中心坐标系
    odom_topic: /odom           # 里程计话题，用于计算速度和平滑数据
    bt_loop_duration: 10        # 行为树刷新周期(毫秒)
    default_server_timeout: 20  # 行为树节点等待Action Server响应的默认超时时间(毫秒)
    wait_for_service_timeout: 2000 # 节点启动时，等待依赖服务(如Planner/Controller)上线的超时时间(毫秒)

    # ================== 默认行为树文件路径 ==================
    default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    default_nav_through_poses_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml"

    # ================== 插件库列表 (Plugin Libs) ==================
    plugin_lib_names:
      # --- 核心动作 (Actions) ---
      - nav2_compute_path_to_pose_action_bt_node       # 调用规划器(Planner)计算到单点的全局路径
      - nav2_compute_path_through_poses_action_bt_node # 调用规划器计算经过多个点的路径
      - nav2_smooth_path_action_bt_node                # 调用平滑器(Smoother)优化路径
      - nav2_follow_path_action_bt_node                # 调用控制器(Controller)跟随路径移动
      
      # --- 恢复行为 (Recoveries) ---
      - nav2_spin_action_bt_node                       # 原地旋转（用于解困或重定位）
      - nav2_back_up_action_bt_node                    # 后退（用于解困）
      - nav2_wait_action_bt_node                       # 原地等待
      - nav2_clear_costmap_service_bt_node             # 清除代价地图（去除假障碍物）
      - nav2_drive_on_heading_bt_node                  # 朝特定方向行驶
      - nav2_assisted_teleop_action_bt_node            # 辅助遥控（有人工介入时）

      # --- 条件检查 (Conditions) ---
      - nav2_is_stuck_condition_bt_node                # 判断机器人是否卡住
      - nav2_goal_reached_condition_bt_node            # 判断是否到达目标
      - nav2_goal_updated_condition_bt_node            # 判断目标点是否被更新
      - nav2_globally_updated_goal_condition_bt_node   # 判断全局目标是否更新
      - nav2_is_path_valid_condition_bt_node           # 判断当前路径是否有效（比如是否被新障碍物阻挡）
      - nav2_initial_pose_received_condition_bt_node   # 判断是否已收到初始位姿（amcl定位初始化）
      - nav2_transform_available_condition_bt_node     # 判断TF坐标变换是否可用
      - nav2_time_expired_condition_bt_node            # 判断计时是否结束
      - nav2_distance_traveled_condition_bt_node       # 判断是否移动了特定距离
      - nav2_is_battery_low_condition_bt_node          # 判断电池电量是否过低
      - nav2_is_battery_charging_condition_bt_node     # 判断是否正在充电
      - nav2_path_expiring_timer_condition             # 路径过期计时器

      # --- 控制流与装饰器 (Controls & Decorators) ---
      - nav2_pipeline_sequence_bt_node                 # 管道序列（最常用，右侧节点一旦成功则重置左侧，用于持续重规划）
      - nav2_round_robin_node_bt_node                  # 轮询执行（用于尝试不同的恢复行为）
      - nav2_recovery_node_bt_node                     # 恢复节点（主任务失败后执行恢复子树）
      - nav2_rate_controller_bt_node                   # 频率控制器（限制子节点执行频率，如1秒规划1次）
      - nav2_distance_controller_bt_node               # 距离控制器（每走x米执行一次）
      - nav2_speed_controller_bt_node                  # 速度控制器（限制速度）
      - nav2_single_trigger_bt_node                    # 单次触发器

      # --- 逻辑操作与辅助 ---
      - nav2_reinitialize_global_localization_service_bt_node # 重置全局定位
      - nav2_truncate_path_action_bt_node              # 截断路径
      - nav2_truncate_path_local_action_bt_node        # 截断局部路径
      - nav2_goal_updater_node_bt_node                 # 更新目标点
      - nav2_goal_updated_controller_bt_node           # 目标更新控制器
      - nav2_remove_passed_goals_action_bt_node        # 移除已经过的途经点

      # --- 动态选择器 (Selectors) ---
      # 允许在运行时动态切换算法（例如进狭窄通道切别的算法）
      - nav2_planner_selector_bt_node                  # 选择不同的规划器
      - nav2_controller_selector_bt_node               # 选择不同的控制器
      - nav2_goal_checker_selector_bt_node             # 选择不同的目标检查器

      # --- 取消操作 (Cancels) ---
      # 专门用于处理“取消任务”时的逻辑
      - nav2_controller_cancel_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node

      # --- 其他高级判断 ---
      - nav2_path_longer_on_approach_bt_node           # 判断新规划的路径是否比旧路径绕远太多

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: False

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: False

#-----------------------------路径规划器参数-----------------------------#
nav2_planner_server_node:
  ros__parameters:
    expected_planner_frequency: 1.0  # 期望的规划频率(Hz)
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      # 指定使用 Navfn 算法
      plugin: "nav2_navfn_planner/NavfnPlanner"
      # 目标点容差 (单位: 米)
      tolerance: 0.3

      # 使用 A* 算法还是 Dijkstra 算法？
      # false = 使用 Dijkstra (迪杰斯特拉)。特点：全图搜索，保证能找到最短路径，但计算稍慢。
      # true  = 使用 A* (A-Star)。特点：启发式搜索，速度快，但路径可能稍微不那么顺滑。
      use_astar: false

      # 是否允许规划出的路径穿过“未知区域”(Unknown Space)
      allow_unknown: false

#-----------------------------全局代价地图参数-----------------------------#
global_costmap:
  global_costmap:
    ros__parameters:
      # ================== 基础设置 ==================
      update_frequency: 1.0       # 地图计算频率(Hz)。每秒计算1次代价地图（合并各层数据）。
                                  # 全局地图不需要太快，1.0-5.0Hz 足够。
      publish_frequency: 1.0      # 地图发布频率(Hz)。每秒把地图发给 Rviz 看1次。
      global_frame: map           # 全局坐标系。通常是 "map"。
      robot_base_frame: base_link # 机器人的中心坐标系。
      use_sim_time: False
      # robot_radius: 0.22          # 机器人半径(米)
      footprint: "[ [0.234, 0.187], [-0.234, 0.187], [-0.234, -0.187], [0.234, -0.187] ]"
      resolution: 0.05            # 地图分辨率(米/像素)。0.05表示一个格子是 5cm x 5cm。
      track_unknown_space: true   # 是否追踪“未知区域”。
                                  # True: 未知区域(灰色) = 不可通行。规划器不会规划到地图外。
                                  # False: 未知区域 = 可通行(当作空地)。
      always_send_full_costmap: False # 是否每次都发送完整地图。True调试方便但费带宽；False只发变化部分。

      # ================== 插件系统 (核心) ==================
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      # ================== 第一层：静态地图层 ==================
      # 负责加载 SLAM 建好的那张黑白底图
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True # 订阅地图话题的 QoS 设置，确保能收到“迟到”的地图。

      # ================== 第二层：障碍物层 ==================
      # 负责实时处理雷达/深度相机数据，标记临时障碍物（如行人、移动的桌椅）
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True             # 是否启用
        observation_sources: scan # 数据源的名字，对应下面的配置块
        scan:
          topic: /scan            # 订阅的雷达话题
          max_obstacle_height: 2.0 # 高于0.5米的障碍物忽略
          clearing: True          # 是否具备“清除”功能（如果雷达扫过这里发现没东西，就清除掉以前的障碍）
          marking: True           # 是否具备“标记”功能（发现障碍物就标在地图上）
          data_type: "LaserScan"  # 数据类型
          raytrace_max_range: 6.0 # 光线追踪清除范围
          raytrace_min_range: 0.0
          obstacle_max_range: 6.0 # 障碍物检测距离
          obstacle_min_range: 0.0

      # ================== 第三层：膨胀层 ==================
      # 负责在障碍物周围生成“危险圈”，防止机器人贴着墙走
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0  # 成本衰减因子。
                                  # 值越大，成本衰减越快（危险圈越陡峭），机器人越敢靠近障碍物。
                                  # 值越小，危险圈越平缓，机器人会离障碍物远远的。
        inflation_radius: 1.0     # 膨胀半径(米)

#-----------------------------路径平滑器参数-----------------------------#
nav2_smoother_server_node:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      # Nav2 自带了 nav2_smoother::SimpleSmoother (简单平滑) 
      # 和 nav2_smoother::SavitzkyGolaySmoother (萨维茨基-戈莱平滑)
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10 # 平滑容差 (Tolerance)。
      max_its: 1000 # 最大迭代次数 (Maximum Iterations)。
      do_refinement: True # 是否进行细化 (Refinement)。

#-----------------------------局部规划器参数-----------------------------#
nav2_controller_server_node:
  ros__parameters:
    use_sim_time: False
    transform_tolerance: 1.0
    controller_frequency: 20.0  # 控制频率 20Hz。即每秒发布 20 次 cmd_vel 指令 (50ms一次)
    
    # 速度阈值过滤：如果计算出的速度小于这些值，就强制设为0，防止电机发出嗡嗡声但不转
    min_x_velocity_threshold: 0.1
    min_y_velocity_threshold: 0.1 
    min_theta_velocity_threshold: 0.01
    
    failure_tolerance: 0.3      # 容错时间。如果控制器算不出速度，允许它“发呆”0.3秒再报错。

    # 定义要加载的插件
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] 
    controller_plugins: ["FollowPath"]

    # ================= 进度检查器 (防止机器人卡死) =================
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5 # 要求的最小移动半径(米)
      movement_time_allowance: 10.0 # 时间限制(秒)
      # 解释：如果机器人在 10秒 内移动距离没超过 0.5米，就认为卡死了，触发恢复行为。

    # ================= 目标检查器 (判断到了没) =================
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.1   # 位置容差(米)
      yaw_goal_tolerance: 0.25  # 角度容差(弧度)。约 14度

    # ================= 路径跟随器 (核心) =================
    #--------------------------------------------TEB-------------------------------------
    # FollowPath:
    #   plugin: teb_local_planner::TebLocalPlannerROS

